<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KWAY 컨텐츠 가이드 생성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
:root{ --purple:#5511bc; --purple-soft:#ede7f6; --hook:#fff3e0; --before:#fbe9e7; --after:#e8f5e9; --line:#e3e3e8; --ink:#1a1a1e; --sub:#6b6b76; }
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif; color:var(--ink); background:#f6f4fb; line-height:1.6; }
.wrap{ max-width:1080px; margin:0 auto; padding:0 20px 80px; }
header{ background:linear-gradient(135deg,#5511bc,#7a3ce0); color:#fff; padding:28px 0 24px; margin-bottom:0; }
header .wrap{ padding-bottom:0; }
header h1{ font-size:22px; font-weight:800; letter-spacing:-.5px; }
header p{ font-size:13px; opacity:.9; margin-top:6px; }
.layout{ display:grid; grid-template-columns:380px 1fr; gap:24px; margin-top:28px; align-items:start; }
@media(max-width:880px){ .layout{ grid-template-columns:1fr; } }
.card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:22px; }
.panel{ position:sticky; top:16px; }
h2{ font-size:15px; font-weight:700; margin-bottom:4px; color:var(--purple); }
.hint{ font-size:12px; color:var(--sub); margin-bottom:16px; }
label{ display:block; font-size:13px; font-weight:600; margin:14px 0 6px; }
label .req{ color:var(--purple); }
label .tag{ font-size:11px; font-weight:500; color:var(--sub); margin-left:4px; }
input[type=text],textarea,select{ width:100%; border:1px solid var(--line); border-radius:9px; padding:10px 12px; font-family:inherit; font-size:13px; color:var(--ink); background:#fff; }
input:focus,textarea:focus,select:focus{ outline:none; border-color:var(--purple); box-shadow:0 0 0 3px rgba(85,17,188,.1); }
textarea{ resize:vertical; min-height:64px; }
.row-list .item{ display:flex; gap:6px; margin-bottom:6px; }
.row-list .item input{ flex:1; }
.mini{ border:1px solid var(--line); background:#fff; color:var(--sub); border-radius:8px; width:34px; flex:none; cursor:pointer; font-size:16px; }
.mini:hover{ border-color:var(--purple); color:var(--purple); }
.addbtn{ font-size:12px; color:var(--purple); background:none; border:none; cursor:pointer; padding:4px 0; font-weight:600; }
.btns{ margin-top:22px; display:flex; flex-direction:column; gap:8px; }
button.primary{ background:var(--purple); color:#fff; border:none; border-radius:10px; padding:13px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
button.primary:hover{ background:#4409a3; }
button.ghost{ background:#fff; color:var(--purple); border:1px solid var(--purple); border-radius:10px; padding:11px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
button.ghost:hover{ background:var(--purple-soft); }
button:disabled{ opacity:.4; cursor:not-allowed; }
.results{ display:flex; flex-direction:column; gap:16px; }
.empty{ text-align:center; color:var(--sub); font-size:14px; padding:80px 20px; }
.empty .big{ font-size:40px; margin-bottom:12px; }
.theme{ border:1px solid var(--line); border-radius:14px; overflow:hidden; }
.theme .th-head{ background:var(--purple); color:#fff; padding:12px 18px; font-size:14px; font-weight:700; }
.theme .th-head span{ opacity:.75; font-weight:500; font-size:12px; margin-left:6px; }
.theme .rowx{ display:grid; grid-template-columns:96px 1fr; border-top:1px solid var(--line); }
.theme .rowx:first-child{ border-top:none; }
.theme .lab{ padding:12px 14px; font-size:12px; font-weight:700; color:var(--purple); background:var(--purple-soft); display:flex; align-items:center; }
.theme .val{ padding:12px 16px; font-size:13px; white-space:pre-wrap; }
.val.hook{ background:var(--hook); font-weight:600; }
.val.before{ background:var(--before); }
.val.after{ background:var(--after); }
.badge{ display:inline-block; font-size:11px; background:var(--purple-soft); color:var(--purple); border-radius:6px; padding:2px 8px; margin-bottom:14px; font-weight:600; }
.note{ font-size:12px; color:var(--sub); background:#faf8ff; border:1px dashed var(--line); border-radius:10px; padding:12px 14px; margin-top:16px; }
.filebtn{ position:relative; overflow:hidden; }
.filebtn input[type=file]{ position:absolute; inset:0; opacity:0; cursor:pointer; }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>KWAY 컨텐츠 가이드 생성기</h1>
    <p>제품 정보만 넣으면 — 실제로 잘 도는 광고 훅을 학습한 6가지 형식의 콘텐츠 가이드를 자동 생성합니다.</p>
  </div>
</header>

<div class="wrap">
<div class="layout">

  <!-- 입력 패널 -->
  <div class="card panel">
    <h2>제품 정보 입력</h2>
    <div class="hint">별표(<span style="color:#5511bc">*</span>)만 필수입니다. 많이 넣을수록 가이드가 정교해집니다.</div>

    <label>1. 제품명 <span class="req">*</span></label>
    <input type="text" id="pname" placeholder="예) 볼트론 항균 바스타올 제로수건">

    <label>사이트 주소</label>
    <input type="text" id="purl" placeholder="예) https://urtowel.com/...">

    <label>카테고리 (대분류) <span class="req">*</span> <span class="tag">(훅 톤 결정)</span></label>
    <select id="pcat"></select>

    <label>세부 카테고리 <span class="req">*</span> <span class="tag">(소구점 특화)</span></label>
    <select id="psub"></select>
    <div id="subHint" class="note" style="display:none"></div>

    <label>2. 제품의 장점 <span class="req">*</span> <span class="tag">(훅의 강한 키 — 최소 1개)</span></label>
    <div class="row-list" id="prosList"></div>
    <button class="addbtn" onclick="addRow('prosList','예) 560g 호텔급 중량')">+ 장점 추가</button>

    <label>3. 컨텐츠 차별점 <span class="req">*</span> <span class="tag">(2~3개 권장)</span></label>
    <div class="row-list" id="diffList"></div>
    <button class="addbtn" onclick="addRow('diffList','예) 구리원사로 균이 못 살아 → 노워시')">+ 차별점 추가</button>

    <label>소비자 핵심 고민 <span class="tag">(선택 · 있으면 훅 강해짐)</span></label>
    <input type="text" id="pain" placeholder="예) 빨아도 안 없어지는 수건 쉰내">

    <label>타깃 / 시즌 <span class="tag">(선택)</span></label>
    <input type="text" id="season" placeholder="예) 장마철, 남편·사춘기 아들 빨래">

    <label>가격 <span class="tag">(선택)</span></label>
    <input type="text" id="price" placeholder="예) 정가 5만원 → 2.98만원">

    <div class="btns">
      <button class="primary" onclick="generate()">가이드 생성</button>
      <button class="ghost" onclick="downloadExcel()" id="xlsxBtn" disabled>📊 엑셀로 내보내기</button>
      <button class="ghost" onclick="downloadMd()" id="mdBtn" disabled>📄 조건값 마크다운 저장</button>
      <button class="ghost filebtn">📂 마크다운 불러오기<input type="file" accept=".md" onchange="loadMd(event)"></button>
    </div>
  </div>

  <!-- 결과 -->
  <div>
    <div class="card">
      <div id="resultHead"></div>
      <div class="results" id="results">
        <div class="empty"><div class="big">🪄</div>왼쪽에 제품 정보를 넣고<br><b>가이드 생성</b>을 누르세요.</div>
      </div>
    </div>
  </div>

</div>
</div>

<script>
/* ============================================================
   훅 패턴 사전 — 프리덤이 메타 광고 라이브러리를 학습해 주입
   (하이브리드: 크롤링은 프리덤 담당, 생성은 웹앱 담당)
   카테고리별로 6형식의 문형·왜먹히나·비포애프터·근거 슬롯을 정의.
   {{P}}=제품명 {{A1}}~{{A3}}=장점 {{D1}}~{{D3}}=차별점 {{PAIN}}=고민 {{SEASON}}=타깃/시즌 {{PRICE}}=가격 {{CAT}}=카테고리명
============================================================ */
/* ============================================================
   훅 패턴 사전 — 프리덤이 메타 광고 라이브러리를 학습해 주입 (8개 쿠팡 대분류)
   하이브리드: 크롤링은 프리덤 담당, 생성은 웹앱 담당.
   슬롯 {{P}}제품 {{A1..3}}장점 {{D1..3}}차별점 {{PAIN}}고민 {{SEASON}}타깃/시즌 {{PRICE}}가격 {{CAT}}카테고리
============================================================ */
const CATEGORIES = {
  "패션의류/잡화": {
    "label": "패션의류 / 잡화",
    "metaLearned": "메타 광고 학습(원피스 검색). 실제 잘 도는 훅: '이번주 뭐 입지 걱정 끝', '똥배 이렇게 쉽게 보정?', '김연아 원피스 20만원대면 무조건', '레어템 수량 적으니 칼입장'. 핵심 무기=핏/체형보정·셀럽착용·데일리룩 고민·희소성.",
    "themes": [
      {
        "title": "개인 충격 고백형",
        "metaRef": "'옷장 반 비웠어요' 류 · 셀럽 브랜드 고백",
        "hook": "저 옷장 반 비웠어요.\n{{P}} 입어보고 나니 나머지가 다 손이 안 가더라고요. {{A1}} 때문에요.",
        "why": "본인이 '옷장을 비웠다'는 극단 행동 고백이 스크롤을 멈춘다. 패션은 '이거 하나로 스타일이 정리됐다'는 서사가 강하다. 장점({{A1}})을 그 이유로 제시.",
        "science": "근거: 실제 착용 전후 코디를 보여줘 '왜 다른 옷이 안 입어지는지' 납득시킨다. 핏·소재를 눈으로.",
        "before": "비포: 아침마다 옷장 앞에서 뭐 입을지 못 고르는 장면, 안 입는 옷 쌓인 서랍.",
        "after": "애프터: {{P}} 한 벌로 완성된 데일리룩 + '{{A1}}' 체감, '그래서 나머지 정리했어요' 자막."
      },
      {
        "title": "데일리룩 고민 공감형",
        "metaRef": "'이번주 뭐 입지? 걱정 끝' · '데일리룩/출근룩/데이트룩'",
        "hook": "'오늘 뭐 입지' 매일 아침 옷장 앞 20분... {{SEASON}} 저만 그런 거 아니죠?\n이거 하나면 그 고민이 끝나요.",
        "why": "매일 반복되는 '뭐 입지' 고민을 정확히 호명 → 강한 공감. 데일리룩·상황별룩(출근/데이트) 니즈로 확장돼 저장률이 높다.",
        "science": "근거: 한 벌로 여러 상황(출근·데이트·나들이)을 소화하는 스타일링 3~4가지를 보여줘 '활용도'를 증명.",
        "before": "비포: 옷은 많은데 입을 게 없어 고민하는 장면.",
        "after": "애프터: {{P}}로 상황별 코디 몽타주 → '한 벌로 다 돼요'."
      },
      {
        "title": "체형 고민 저격형",
        "metaRef": "'똥배 이렇게 쉽게 보정?' · '힙업/무봉제/속옷자국 없음'",
        "hook": "똥배·팔뚝·힙 라인, 옷으로 가려지는 거 아세요?\n{{D1}} — 입는 순간 실루엣이 정리돼요.",
        "why": "체형 콤플렉스(똥배·팔뚝·힙)를 정확히 찌르는 건 패션 광고 전환율 최상 문형. '노력 없이 옷으로 해결'이 후킹.",
        "science": "근거: 착용 전후 실루엣을 같은 각도로 비교. 보정 포인트({{D1}})를 자막으로 짚는다.",
        "before": "비포: 신경 쓰이는 체형 부위가 드러나는 기존 옷.",
        "after": "애프터: {{P}} 착용 후 정리된 라인 + '{{D1}}' 클로즈업."
      },
      {
        "title": "셀럽·소셜프루프 증명형",
        "metaRef": "'김연아도 입은 원피스, 천만원대는 못 사도 이건 되죠'",
        "hook": "요즘 SNS에서 난리난 그 {{CAT}}, 저도 결국 샀어요.\n{{D2}} 때문에 다들 사는 거였어요.",
        "why": "'남들이 다 산다(소셜프루프)' + '셀럽 착용'이 구매 확신을 준다. 패션은 유행·희소성 심리가 강해 특히 효과적.",
        "science": "근거: 실착 후기·판매 반응·셀럽 유사룩을 근거로 제시(과장 없이). {{D2}}가 인기 이유임을 연결.",
        "before": "비포: '나한테도 어울릴까' 망설이는 장면.",
        "after": "애프터: {{P}} 실착 + '역시 사길 잘했다' 리액션."
      },
      {
        "title": "스펙·디테일 안심형",
        "metaRef": "'핏·소재·사이즈' 체크 · '무료배송'",
        "hook": "{{P}} 왜 다른지 딱 세 줄로.\n✔ {{A1}}\n✔ {{A2}}\n✔ {{A3}}",
        "why": "핏·소재·사이즈 같은 구매 결정 요소를 체크리스트로 정리해 확신을 준다. 온라인 의류는 '실패 두려움'이 커서 디테일 정보가 전환을 만든다.",
        "science": "근거: 소재 혼용률·사이즈 실측·세탁법을 사실대로. 과장하면 반품으로 돌아온다.",
        "before": "비포: 온라인 옷 실패 경험(사이즈·소재 다름).",
        "after": "애프터: {{P}}의 {{A1}}/{{A2}}/{{A3}} 디테일 클로즈업."
      },
      {
        "title": "가격·희소성 재계산형",
        "metaRef": "'20만원대면 무조건', '레어템 수량 적으니 칼입장'",
        "hook": "{{PRICE}} — 이 퀄리티에 이 가격은 지금뿐이에요.\n{{D1}}인데 수량이 많지 않아요.",
        "why": "희소성(수량 한정)+가격 대비 가치로 즉시 구매를 압박. 패션 공구의 '칼입장' 문형. 놓치면 후회 심리 자극.",
        "science": "근거: 동급 브랜드/백화점가와 비교해 '실질 가치'를 재계산(사실 기준).",
        "before": "비포: 비슷한 걸 더 비싸게 산 경험.",
        "after": "애프터: {{PRICE}} + '수량 한정' 자막으로 마감 압박."
      }
    ]
  },
  "뷰티": {
    "label": "뷰티 (스킨케어·메이크업)",
    "metaLearned": "메타 광고 학습(세럼 검색). 실제 훅: '연예인 극찬 세럼', '미국서 난리난 모공삭제 루틴, 왜 안 하세요?', '트러블 직빵세럼 1+1', '저속노화'. 핵심 무기=피부 변화(모공/트러블/주름)·연예인/셀럽·before&after·공구마감 한정.",
    "themes": [
      {
        "title": "개인 피부변화 고백형",
        "metaRef": "'화장품 다 정리했어요' · '피부가 잘 먹어요'",
        "hook": "저 화장대 다 비웠어요.\n{{P}} 쓰고 피부가 바뀌니까 나머지가 필요 없더라고요. {{A1}}",
        "why": "'화장품을 다 정리했다'는 고백 + 실제 피부 변화가 신뢰를 만든다. 뷰티는 '내 피부로 증명'이 핵심.",
        "science": "근거: 사용 전후 피부(민낯) 비교. 과장 금지, 개인 체험 톤. 성분·인증 있으면 자막.",
        "before": "비포: 여러 제품 발라도 그대로인 피부 고민 민낯.",
        "after": "애프터: {{P}} 사용 후 피부결/톤 변화 클로즈업 + '{{A1}}'."
      },
      {
        "title": "피부 고민 공감형",
        "metaRef": "'트러블 고민인 사람 주목', '모공만 없어도 10년 어려질 텐데'",
        "hook": "{{PAIN}} — 아무리 관리해도 그대로죠?\n원인을 모르고 겉만 케어하니까 그래요.",
        "why": "모공·트러블·주름 등 구체 고민({{PAIN}})을 호명 → '내 얘기'. '원인을 몰랐다'는 반전이 해결책을 강하게 만든다.",
        "science": "근거: 고민의 원인(피지·수분부족·각질 등)을 설명 → {{D1}}(으)로 해결. 성분 메커니즘을 근거로.",
        "before": "비포: {{PAIN}} 겪는 피부 + 흔한 헛수고(비싼 제품 이것저것).",
        "after": "애프터: {{D1}} 자막 + 개선된 피부."

function hasJong(word){
  if(!word) return false;
  const ch=word[word.length-1]; const code=ch.charCodeAt(0);
  if(code<0xAC00||code>0xD7A3) return true; // 한글 아니면 받침 있는 것처럼(안전)
  return (code-0xAC00)%28 !== 0;
}
function fill(tpl, I){
  const cat=CATEGORIES[I.cat];
  const P=I.pname||'(제품명)';
  const jong=hasJong(P);
  // 조사 마커 치환: {{가}}=이/가 {{를}}=을/를 {{는}}=은/는 {{와}}=과/와
  const josa={'{{가}}':jong?'이':'가','{{를}}':jong?'을':'를','{{는}}':jong?'은':'는','{{와}}':jong?'과':'와'};
  tpl=tpl.replace(/\{\{[가를는와]\}\}/g, m=>josa[m]!==undefined?josa[m]:m);
  const map={
    '{{P}}': I.pname||'(제품명)',
    '{{CAT}}': (SUBCATS[I.cat]&&SUBCATS[I.cat][I.sub]&&SUBCATS[I.cat][I.sub].word) || cat.label.split(' ')[0],
    '{{SUB}}': I.sub||cat.label.split(' ')[0],
    '{{A1}}': I.pros[0]||'(장점1)',
    '{{A2}}': I.pros[1]||I.pros[0]||'(장점2)',
    '{{A3}}': I.pros[2]||I.pros[1]||I.pros[0]||'(장점3)',
    '{{D1}}': I.diffs[0]||'(차별점1)',
    '{{D2}}': I.diffs[1]||I.diffs[0]||'(차별점2)',
    '{{D3}}': I.diffs[2]||I.diffs[1]||I.diffs[0]||'(차별점3)',
    '{{PAIN}}': I.pain||'그 고민',
    '{{SEASON}}': I.season||'',
    '{{PRICE}}': I.price||'이 가격'
  };
  return tpl.replace(/\{\{[A-Z0-9]+\}\}/g, m=>map[m]!==undefined?map[m]:m);
}

let LAST=null;
function buildThemes(I){
  const cat=CATEGORIES[I.cat];
  return cat.themes.map((t,i)=>({
    no:i+1, title:t.title, metaRef:t.metaRef,
    hook:fill(t.hook,I), why:fill(t.why,I), science:fill(t.science,I),
    before:fill(t.before,I), after:fill(t.after,I)
  }));
}

function validate(I){
  const miss=[];
  if(!I.pname) miss.push('제품명');
  if(!I.pros.length) miss.push('장점(최소 1개)');
  if(!I.diffs.length) miss.push('차별점(최소 1개)');
  if(!I.sub) miss.push('세부 카테고리');
  return miss;
}

function generate(){
  const I=getInputs();
  const miss=validate(I);
  if(miss.length){ alert('필수 항목을 채워주세요:\n· '+miss.join('\n· ')); return; }
  const themes=buildThemes(I);
  LAST={inputs:I, themes};
  render(I, themes);
  document.getElementById('xlsxBtn').disabled=false;
  document.getElementById('mdBtn').disabled=false;
}

function render(I, themes){
  const cat=CATEGORIES[I.cat];
  document.getElementById('resultHead').innerHTML =
    `<span class="badge">${cat.label} › ${I.sub||''} · 6가지 형식</span>
     <div class="note"><b>훅 학습 출처:</b> ${cat.metaLearned}</div>`;
  const box=document.getElementById('results');
  box.innerHTML='';
  themes.forEach(t=>{
    const el=document.createElement('div'); el.className='theme';
    el.innerHTML=`
      <div class="th-head">주제 ${t.no}. ${t.title}<span>· 참고 실제광고: ${t.metaRef}</span></div>
      <div class="rowx"><div class="lab">후킹 문구</div><div class="val hook">${esc(t.hook)}</div></div>
      <div class="rowx"><div class="lab">왜 먹히나</div><div class="val">${esc(t.why)}</div></div>
      <div class="rowx"><div class="lab">공신력 근거</div><div class="val">${esc(t.science)}</div></div>
      <div class="rowx"><div class="lab">비포</div><div class="val before">${esc(t.before)}</div></div>
      <div class="rowx"><div class="lab">애프터</div><div class="val after">${esc(t.after)}</div></div>`;
    box.appendChild(el);
  });
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  const fill=(c)=>({type:'pattern',pattern:'solid',fgColor:{argb:'FF'+c}});
  const border={top:{style:'thin',color:{argb:'FFD0D0D0'}},left:{style:'thin',color:{argb:'FFD0D0D0'}},bottom:{style:'thin',color:{argb:'FFD0D0D0'}},right:{style:'thin',color:{argb:'FFD0D0D0'}}};

  let r=1;
  ws.mergeCells(r,1,r,2);
  let c=ws.getCell(r,1); c.value=`${I.pname} — 콘텐츠 훅 주제 뱅크`;
  c.font={name:'맑은 고딕',size:15,bold:true,color:{argb:'FFFFFFFF'}}; c.fill=fill(P); c.alignment={horizontal:'center',vertical:'middle'}; ws.getRow(r).height=30; r++;
  ws.mergeCells(r,1,r,2);
  c=ws.getCell(r,1); c.value=`카테고리: ${cat.label}  |  훅 학습: ${cat.metaLearned}`;
  c.font={name:'맑은 고딕',size:9,color:{argb:'FF5511BC'}}; c.fill=fill(SOFT); c.alignment=wrap; ws.getRow(r).height=48; r++;
  r++;
  themes.forEach(t=>{
    ws.mergeCells(r,1,r,2);
    c=ws.getCell(r,1); c.value=`주제 ${t.no}.  ${t.title}`;
    c.font={name:'맑은 고딕',size:12,bold:true,color:{argb:'FFFFFFFF'}}; c.fill=fill(P); c.alignment={vertical:'middle',indent:1}; ws.getRow(r).height=24; r++;
    const rows=[['후킹 문구',t.hook,HOOK,56],['왜 먹히나',t.why,null,46],['공신력 근거',t.science,SOFT,40],['비포 (Before)',t.before,BEF,42],['애프터 (After)',t.after,AFT,42],['참고 실제광고',t.metaRef,null,30]];
    rows.forEach(([lab,val,bg,h])=>{
      const lc=ws.getCell(r,1); lc.value=lab; lc.font={name:'맑은 고딕',size:10,bold:true,color:{argb:'FF5511BC'}}; lc.alignment={horizontal:'center',vertical:'middle',wrapText:true}; lc.border=border; if(bg)lc.fill=fill(bg);
      const vc=ws.getCell(r,2); vc.value=val; vc.font={name:'맑은 고딕',size:10}; vc.alignment=wrap; vc.border=border; if(bg)vc.fill=fill(bg);
      ws.getRow(r).height=h; r++;
    });
    r++;
  });

  // 시트2 입력 조건값
  const ws2=wb.addWorksheet('입력_조건값',{views:[{showGridLines:false}]});
  ws2.columns=[{width:16},{width:74}];
  let r2=1;
  ws2.mergeCells(r2,1,r2,2); let c2=ws2.getCell(r2,1); c2.value='입력 조건값 (재현용)';
  c2.font={name:'맑은 고딕',size:13,bold:true,color:{argb:'FFFFFFFF'}}; c2.fill=fill(P); c2.alignment={horizontal:'center'}; ws2.getRow(r2).height=26; r2+=2;
  const kv=[['제품명',I.pname],['사이트',I.purl||'-'],['카테고리',cat.label],['장점', I.pros.map((p,i)=>`${i+1}. ${p}`).join('\n')||'-'],['차별점', I.diffs.map((d,i)=>`${i+1}. ${d}`).join('\n')||'-'],['소비자 고민',I.pain||'-'],['타깃/시즌',I.season||'-'],['가격',I.price||'-']];
  kv.forEach(([k,v])=>{
    const kc=ws2.getCell(r2,1); kc.value=k; kc.font={name:'맑은 고딕',size:10,bold:true}; kc.fill=fill(SOFT); kc.alignment={horizontal:'center',vertical:'middle'}; kc.border=border;
    const vc=ws2.getCell(r2,2); vc.value=v; vc.font={name:'맑은 고딕',size:10}; vc.alignment=wrap; vc.border=border;
    ws2.getRow(r2).height=Math.max(22, 16*((''+v).split('\n').length)); r2++;
  });

  const buf=await wb.xlsx.writeBuffer();
  saveBlob(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}), `[KWAY]_${I.pname||'제품'}_콘텐츠가이드.xlsx`);
}

/* ---------- 조건값 마크다운 (재현성) ---------- */
function downloadMd(){
  if(!LAST) return;
  const I=LAST.inputs;
  const md=`---
type: kway-content-guide-input
version: 1
---
# 컨텐츠 가이드 입력 조건값

- 제품명: ${I.pname}
- 사이트: ${I.purl}
- 카테고리: ${I.cat}
- 소비자고민: ${I.pain}
- 타깃시즌: ${I.season}
- 가격: ${I.price}

## 장점
${I.pros.map(p=>'- '+p).join('\n')}

## 차별점
${I.diffs.map(d=>'- '+d).join('\n')}
`;
  saveBlob(new Blob([md],{type:'text/markdown'}), `[KWAY]_${I.pname||'제품'}_조건값.md`);
}

function loadMd(ev){
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=e=>{ applyMd(e.target.result); };
  rd.readAsText(f);
}
function applyMd(txt){
  const get=(k)=>{ const m=txt.match(new RegExp('- '+k+':\\s*(.*)')); return m?m[1].trim():''; };
  document.getElementById('pname').value=get('제품명');
  document.getElementById('purl').value=get('사이트');
  document.getElementById('pain').value=get('소비자고민');
  document.getElementById('season').value=get('타깃시즌');
  document.getElementById('price').value=get('가격');
  const cat=get('카테고리'); if(CATEGORIES[cat]) document.getElementById('pcat').value=cat;
  // 리스트 파싱
  const secList=(head)=>{ const re=new RegExp('## '+head+'\\n([\\s\\S]*?)(\\n##|$)'); const m=txt.match(re); return m? m[1].split('\n').filter(l=>l.startsWith('- ')).map(l=>l.slice(2).trim()):[]; };
  const pros=secList('장점'), diffs=secList('차별점');
  document.getElementById('prosList').innerHTML=''; document.getElementById('diffList').innerHTML='';
  (pros.length?pros:['']).forEach(v=>{ addRow('prosList',''); });
  (diffs.length?diffs:['']).forEach(v=>{ addRow('diffList',''); });
  [...document.querySelectorAll('#prosList input')].forEach((el,i)=>el.value=pros[i]||'');
  [...document.querySelectorAll('#diffList input')].forEach((el,i)=>el.value=diffs[i]||'');
  alert('조건값을 불러왔습니다. [가이드 생성]을 누르면 동일한 결과가 나옵니다.');
}

function saveBlob(blob, name){
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 2000);
}
</script>
